<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf8ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 0 16px;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            color: #776e65;
            margin-bottom: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .scores {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: #bbada0;
            border-radius: 6px;
            padding: 8px 20px;
            min-width: 80px;
            text-align: center;
        }

        .score-box .label {
            font-size: 12px;
            font-weight: 600;
            color: #eee4da;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box .value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #9f8b77;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .board-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            margin-bottom: 16px;
            touch-action: none;
        }

        .board {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #bbada0;
            border-radius: 8px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
        }

        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tile-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            border-radius: 6px;
            transition: top 0.12s ease, left 0.12s ease;
        }

        .tile.new {
            animation: appear 0.2s ease;
        }

        .tile.merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay.win {
            background: rgba(237, 194, 46, 0.5);
        }

        .overlay h2 {
            font-size: 48px;
            font-weight: 700;
            color: #776e65;
            margin-bottom: 16px;
        }

        .overlay .btn {
            font-size: 18px;
            padding: 12px 32px;
        }

        .tip {
            color: #776e65;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 触摸设备提示 */
        @media (pointer: coarse) {
            .tip::after {
                content: '滑动屏幕移动方块';
            }
        }
        @media (pointer: fine) {
            .tip::after {
                content: '使用方向键或 WASD 移动方块';
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn" id="newGameBtn">新游戏</button>
            <button class="btn" id="undoBtn">撤销</button>
        </div>
        <div class="board-wrapper">
            <div class="board" id="board">
                <!-- 背景格子 -->
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="tile-layer" id="tileLayer"></div>
            <!-- 游戏结束遮罩 -->
            <div class="overlay" id="gameOverOverlay">
                <h2>游戏结束</h2>
                <button class="btn" id="retryBtn">再来一局</button>
            </div>
            <!-- 胜利遮罩 -->
            <div class="overlay win" id="winOverlay">
                <h2>你赢了! 🎉</h2>
                <button class="btn" id="continueBtn">继续游戏</button>
            </div>
        </div>
        <p class="tip"></p>
    </div>

    <script>
    (function () {
        const SIZE = 4;
        const tileLayer = document.getElementById('tileLayer');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const winOverlay = document.getElementById('winOverlay');

        let grid, score, best, won, over, prevState;

        // 方块颜色配置
        const TILE_STYLES = {
            2:    { bg: '#eee4da', color: '#776e65', fontSize: 40 },
            4:    { bg: '#ede0c8', color: '#776e65', fontSize: 40 },
            8:    { bg: '#f2b179', color: '#f9f6f2', fontSize: 40 },
            16:   { bg: '#f59563', color: '#f9f6f2', fontSize: 36 },
            32:   { bg: '#f67c5f', color: '#f9f6f2', fontSize: 36 },
            64:   { bg: '#f65e3b', color: '#f9f6f2', fontSize: 36 },
            128:  { bg: '#edcf72', color: '#f9f6f2', fontSize: 32 },
            256:  { bg: '#edcc61', color: '#f9f6f2', fontSize: 32 },
            512:  { bg: '#edc850', color: '#f9f6f2', fontSize: 32 },
            1024: { bg: '#edc53f', color: '#f9f6f2', fontSize: 26 },
            2048: { bg: '#edc22e', color: '#f9f6f2', fontSize: 26 },
        };

        function getStyle(val) {
            return TILE_STYLES[val] || { bg: '#3c3a32', color: '#f9f6f2', fontSize: 22 };
        }

        // 保存游戏进度到 localStorage
        function saveGame() {
            try {
                localStorage.setItem('game2048', JSON.stringify({
                    grid, score, won, over
                }));
            } catch {}
        }

        // 从 localStorage 恢复游戏进度
        function loadGame() {
            try {
                const data = JSON.parse(localStorage.getItem('game2048'));
                if (data && data.grid && data.grid.length === SIZE) {
                    grid = data.grid;
                    score = data.score || 0;
                    won = !!data.won;
                    over = !!data.over;
                    prevState = null;
                    gameOverOverlay.classList.remove('active');
                    winOverlay.classList.remove('active');
                    if (over) gameOverOverlay.classList.add('active');
                    render();
                    loadBest();
                    return true;
                }
            } catch {}
            return false;
        }

        function clearSavedGame() {
            try { localStorage.removeItem('game2048'); } catch {}
        }

        // 初始化（新游戏）
        function init() {
            grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            score = 0;
            won = false;
            over = false;
            prevState = null;
            gameOverOverlay.classList.remove('active');
            winOverlay.classList.remove('active');
            addRandom();
            addRandom();
            render();
            loadBest();
            saveGame();
        }

        function loadBest() {
            try { best = parseInt(localStorage.getItem('best2048')) || 0; } catch { best = 0; }
            bestEl.textContent = best;
        }

        function saveBest() {
            if (score > best) {
                best = score;
                try { localStorage.setItem('best2048', best); } catch {}
            }
            bestEl.textContent = best;
        }

        // 保存状态用于撤销
        function saveState() {
            prevState = {
                grid: grid.map(r => [...r]),
                score: score
            };
        }

        function undo() {
            if (!prevState) return;
            grid = prevState.grid;
            score = prevState.score;
            prevState = null;
            over = false;
            gameOverOverlay.classList.remove('active');
            render();
            saveGame();
        }

        // 随机添加方块
        function addRandom() {
            const empty = [];
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] === 0) empty.push([r, c]);
            if (empty.length === 0) return;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return [r, c];
        }

        // 渲染
        function render(newTiles = [], mergedTiles = []) {
            scoreEl.textContent = score;
            saveBest();
            tileLayer.innerHTML = '';

            const wrapperRect = tileLayer.parentElement.getBoundingClientRect();
            const boardPx = wrapperRect.width;
            const padding = 10;
            const gap = 10;
            const innerSize = boardPx - padding * 2;
            const cellSize = (innerSize - gap * (SIZE - 1)) / SIZE;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const val = grid[r][c];
                    if (val === 0) continue;

                    const style = getStyle(val);
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    const isNew = newTiles.some(([nr, nc]) => nr === r && nc === c);
                    const isMerged = mergedTiles.some(([mr, mc]) => mr === r && mc === c);
                    if (isNew) tile.classList.add('new');
                    if (isMerged) tile.classList.add('merged');

                    const left = c * (cellSize + gap);
                    const top = r * (cellSize + gap);

                    tile.style.cssText = `
                        width: ${cellSize}px;
                        height: ${cellSize}px;
                        left: ${left}px;
                        top: ${top}px;
                        background: ${style.bg};
                        color: ${style.color};
                        font-size: ${style.fontSize * (cellSize / 107)}px;
                    `;
                    tile.textContent = val;
                    tileLayer.appendChild(tile);
                }
            }
        }

        // 移动逻辑
        function slide(row) {
            let arr = row.filter(v => v !== 0);
            const merged = [];
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                    merged.push(i);
                    i++;
                }
            }
            arr = arr.filter(v => v !== 0);
            while (arr.length < SIZE) arr.push(0);
            return { result: arr, merged };
        }

        function move(dir) {
            if (over) return false;

            saveState();
            let moved = false;
            const mergedPositions = [];

            if (dir === 'left' || dir === 'right') {
                for (let r = 0; r < SIZE; r++) {
                    let row = [...grid[r]];
                    if (dir === 'right') row.reverse();
                    const { result, merged } = slide(row);
                    if (dir === 'right') {
                        result.reverse();
                        merged.forEach((_, idx) => {
                            mergedPositions.push([r, SIZE - 1 - merged[idx]]);
                        });
                    } else {
                        merged.forEach(i => mergedPositions.push([r, i]));
                    }
                    if (row.join(',') !== [...grid[r]].join(',') || result.join(',') !== [...grid[r]].join(',')) {
                        // 检查是否真的变了
                    }
                    if (result.join(',') !== grid[r].join(',')) moved = true;
                    grid[r] = result;
                }
            } else {
                for (let c = 0; c < SIZE; c++) {
                    let col = [];
                    for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
                    if (dir === 'down') col.reverse();
                    const { result, merged } = slide(col);
                    if (dir === 'down') {
                        result.reverse();
                        merged.forEach((_, idx) => {
                            mergedPositions.push([SIZE - 1 - merged[idx], c]);
                        });
                    } else {
                        merged.forEach(i => mergedPositions.push([i, c]));
                    }
                    const original = [];
                    for (let r = 0; r < SIZE; r++) original.push(grid[r][c]);
                    if (result.join(',') !== original.join(',')) moved = true;
                    for (let r = 0; r < SIZE; r++) grid[r][c] = result[r];
                }
            }

            if (!moved) {
                prevState = null;
                return false;
            }

            const newTile = addRandom();
            const newTiles = newTile ? [newTile] : [];
            render(newTiles, mergedPositions);
            saveGame();

            // 检查是否达到 2048
            if (!won) {
                for (let r = 0; r < SIZE; r++)
                    for (let c = 0; c < SIZE; c++)
                        if (grid[r][c] === 2048) {
                            won = true;
                            winOverlay.classList.add('active');
                            return true;
                        }
            }

            // 检查游戏是否结束
            if (isGameOver()) {
                over = true;
                gameOverOverlay.classList.add('active');
            }

            return true;
        }

        function isGameOver() {
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
                }
            return true;
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            const map = {
                ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down',
                a: 'left', d: 'right', w: 'up', s: 'down',
                A: 'left', D: 'right', W: 'up', S: 'down',
            };
            const dir = map[e.key];
            if (dir) {
                e.preventDefault();
                move(dir);
            }
        });

        // 触摸事件
        let touchStartX, touchStartY;
        const boardEl = document.getElementById('board').parentElement;

        boardEl.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        boardEl.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        boardEl.addEventListener('touchend', (e) => {
            if (touchStartX == null) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 20) return;

            if (absDx > absDy) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
            touchStartX = null;
        }, { passive: true });

        // 按钮
        document.getElementById('newGameBtn').addEventListener('click', init);
        document.getElementById('retryBtn').addEventListener('click', init);
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('continueBtn').addEventListener('click', () => {
            winOverlay.classList.remove('active');
        });

        // 窗口大小变化时重新渲染
        window.addEventListener('resize', () => render());

        // 启动：优先恢复存档，没有存档则新游戏
        if (!loadGame()) {
            init();
        }
    })();
    </script>
</body>
</html>
