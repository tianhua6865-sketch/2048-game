<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 小游戏中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            z-index: 20;
        }
        .back-btn {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        #hud { font-size: 16px; font-weight: 600; }

        .game-container {
            position: relative;
            touch-action: none;
        }

        canvas {
            display: block;
            border-radius: 8px;
            background: #16213e;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 32px; margin-bottom: 8px; }
        .overlay .sub { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
        .overlay button {
            background: #51cf66;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .overlay button:hover { background: #40c057; }

        .d-pad {
            display: none;
            margin-top: 20px;
            width: 180px;
            height: 180px;
            position: relative;
        }
        .d-pad button {
            position: absolute;
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .d-pad button:active { background: rgba(255,255,255,0.25); }
        .d-pad .up    { top: 0; left: 50%; transform: translateX(-50%); }
        .d-pad .down  { bottom: 0; left: 50%; transform: translateX(-50%); }
        .d-pad .left  { top: 50%; left: 0; transform: translateY(-50%); }
        .d-pad .right { top: 50%; right: 0; transform: translateY(-50%); }

        @media (pointer: coarse) {
            .d-pad { display: block; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="back-btn" href="../../">← 返回</a>
        <div id="hud">得分: 0</div>
    </div>

    <div class="game-container" id="gameContainer">
        <canvas id="canvas"></canvas>
        <div class="overlay" id="startOverlay">
            <h2>🐍 贪吃蛇</h2>
            <p class="sub">方向键 / WASD / 滑动控制</p>
            <button id="startBtn">开始游戏</button>
        </div>
        <div class="overlay hidden" id="gameOverOverlay">
            <h2>游戏结束</h2>
            <div class="sub" id="finalScore">得分: 0</div>
            <button id="retryBtn">再来一局</button>
        </div>
    </div>

    <div class="d-pad" id="dpad">
        <button class="up" data-dir="up">▲</button>
        <button class="down" data-dir="down">▼</button>
        <button class="left" data-dir="left">◀</button>
        <button class="right" data-dir="right">▶</button>
    </div>

    <script>
    (function() {
        const GRID = 20;
        const COLS = 20;
        const ROWS = 20;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const container = document.getElementById('gameContainer');

        canvas.width = COLS * GRID;
        canvas.height = ROWS * GRID;

        let snake, dir, nextDir, food, score, gameOver, intervalId, speed;

        function init() {
            const mid = Math.floor(COLS / 2);
            snake = [
                { x: mid, y: Math.floor(ROWS / 2) },
                { x: mid - 1, y: Math.floor(ROWS / 2) },
                { x: mid - 2, y: Math.floor(ROWS / 2) }
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            speed = 130;
            hud.textContent = '得分: 0';
            gameOverOverlay.classList.add('hidden');
            placeFood();
        }

        function placeFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function setDir(d) {
            const map = {
                up:    { x: 0, y: -1 },
                down:  { x: 0, y: 1 },
                left:  { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            const nd = map[d];
            if (!nd) return;
            // 不能反向
            if (nd.x === -dir.x && nd.y === -dir.y) return;
            nextDir = nd;
        }

        // 键盘
        document.addEventListener('keydown', e => {
            const map = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right',
                W: 'up', S: 'down', A: 'left', D: 'right'
            };
            if (map[e.key]) {
                e.preventDefault();
                setDir(map[e.key]);
            }
        });

        // 触摸滑动
        let touchStartX, touchStartY;
        container.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        container.addEventListener('touchmove', e => {
            e.preventDefault();
        }, { passive: false });
        container.addEventListener('touchend', e => {
            if (touchStartX == null) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 'right' : 'left');
            } else {
                setDir(dy > 0 ? 'down' : 'up');
            }
            touchStartX = null;
        }, { passive: true });

        // 虚拟方向键
        document.getElementById('dpad').addEventListener('click', e => {
            const d = e.target.dataset.dir;
            if (d) setDir(d);
        });

        function step() {
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // 撞墙
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }
            // 撞自己
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                hud.textContent = '得分: ' + score;
                placeFood();
                // 加速
                if (speed > 60) {
                    speed -= 2;
                    clearInterval(intervalId);
                    intervalId = setInterval(step, speed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame() {
            gameOver = true;
            clearInterval(intervalId);
            finalScoreEl.textContent = '得分: ' + score;
            gameOverOverlay.classList.remove('hidden');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 网格线
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID, 0);
                ctx.lineTo(i * GRID, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID);
                ctx.lineTo(canvas.width, i * GRID);
                ctx.stroke();
            }

            // 食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // 蛇
            snake.forEach((s, i) => {
                const t = i / snake.length;
                ctx.fillStyle = i === 0 ? '#51cf66' : `hsl(140, 60%, ${55 - t * 20}%)`;
                const pad = i === 0 ? 1 : 2;
                ctx.fillRect(s.x * GRID + pad, s.y * GRID + pad, GRID - pad * 2, GRID - pad * 2);
                if (i === 0) {
                    // 圆角头部
                    ctx.fillStyle = '#51cf66';
                    const r = GRID / 2 - 1;
                    ctx.beginPath();
                    ctx.arc(s.x * GRID + GRID / 2, s.y * GRID + GRID / 2, r, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function startGame() {
            startOverlay.classList.add('hidden');
            init();
            draw();
            clearInterval(intervalId);
            intervalId = setInterval(step, speed);
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('retryBtn').addEventListener('click', () => {
            init();
            draw();
            clearInterval(intervalId);
            intervalId = setInterval(step, speed);
        });
    })();
    </script>
</body>
</html>
