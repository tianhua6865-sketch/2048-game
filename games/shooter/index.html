<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打飞机 - 小游戏中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            z-index: 20;
        }
        .back-btn {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            transition: background 0.15s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        #hud {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        canvas {
            display: block;
            background: #111;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            color: #fff;
        }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 36px; margin-bottom: 8px; }
        .overlay .final-score { font-size: 20px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
        .overlay button {
            background: #f7971e;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .overlay button:hover { background: #e88a10; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="back-btn" href="../../">← 返回</a>
        <div id="hud">得分: 0</div>
    </div>
    <canvas id="canvas"></canvas>

    <div class="overlay" id="startOverlay">
        <h2>🚀 打飞机</h2>
        <p style="color:rgba(255,255,255,0.6);margin-bottom:24px;">点击或触摸开始</p>
        <button id="startBtn">开始游戏</button>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <h2>游戏结束</h2>
        <div class="final-score" id="finalScore">得分: 0</div>
        <button id="retryBtn">再来一局</button>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');

        let W, H, player, bullets, enemies, particles, score, gameOver, animId;
        let pointerX = null;
        let lastShot = 0;
        const SHOOT_INTERVAL = 180;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function init() {
            score = 0;
            gameOver = false;
            bullets = [];
            enemies = [];
            particles = [];
            player = { x: W / 2, y: H - 80, w: 32, h: 36, speed: 6 };
            pointerX = null;
            lastShot = 0;
            hud.textContent = '得分: 0';
            gameOverOverlay.classList.add('hidden');
        }

        function spawnEnemy() {
            const size = 20 + Math.random() * 20;
            enemies.push({
                x: size + Math.random() * (W - size * 2),
                y: -size,
                w: size,
                h: size,
                speed: 1.5 + Math.random() * 2.5,
                hp: size > 30 ? 2 : 1
            });
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 20 + Math.random() * 20,
                    maxLife: 40,
                    color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function shoot(now) {
            if (now - lastShot < SHOOT_INTERVAL) return;
            lastShot = now;
            bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 8 });
        }

        // 输入处理
        const keys = {};
        document.addEventListener('keydown', e => { keys[e.key] = true; });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        canvas.addEventListener('pointermove', e => { pointerX = e.clientX; });
        canvas.addEventListener('pointerdown', e => { pointerX = e.clientX; });
        canvas.addEventListener('pointerleave', () => { pointerX = null; });

        function updatePlayer() {
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;

            if (pointerX !== null) {
                const dx = pointerX - player.x;
                if (Math.abs(dx) > 2) {
                    player.x += Math.sign(dx) * Math.min(Math.abs(dx) * 0.15, player.speed);
                }
            }

            player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            // 机身
            ctx.fillStyle = '#4fc3f7';
            ctx.beginPath();
            ctx.moveTo(0, -player.h / 2);
            ctx.lineTo(-player.w / 2, player.h / 2);
            ctx.lineTo(player.w / 2, player.h / 2);
            ctx.closePath();
            ctx.fill();
            // 火焰
            ctx.fillStyle = '#ff9800';
            ctx.beginPath();
            ctx.moveTo(-6, player.h / 2);
            ctx.lineTo(0, player.h / 2 + 10 + Math.random() * 6);
            ctx.lineTo(6, player.h / 2);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function rectCollide(a, b) {
            return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
                   Math.abs(a.y - b.y) < (a.h + b.h) / 2;
        }

        let spawnTimer = 0;

        function update(now) {
            updatePlayer();
            shoot(now);

            // 子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -10) bullets.splice(i, 1);
            }

            // 敌人生成
            spawnTimer++;
            const spawnRate = Math.max(15, 45 - Math.floor(score / 10));
            if (spawnTimer >= spawnRate) {
                spawnTimer = 0;
                spawnEnemy();
            }

            // 敌人移动 & 碰撞
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;

                // 出界
                if (e.y > H + 50) { enemies.splice(i, 1); continue; }

                // 子弹命中
                let hit = false;
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (Math.abs(b.x - e.x) < e.w / 2 + 4 && Math.abs(b.y - e.y) < e.h / 2 + 4) {
                        bullets.splice(j, 1);
                        e.hp--;
                        if (e.hp <= 0) {
                            hit = true;
                            score += e.w > 30 ? 3 : 1;
                            hud.textContent = '得分: ' + score;
                            spawnParticles(e.x, e.y, '#ff6b6b', 8);
                            enemies.splice(i, 1);
                        } else {
                            spawnParticles(b.x, b.y, '#ffd200', 3);
                        }
                        break;
                    }
                }
                if (hit) continue;

                // 撞到玩家
                if (rectCollide(player, e)) {
                    spawnParticles(player.x, player.y, '#4fc3f7', 15);
                    gameOver = true;
                    finalScoreEl.textContent = '得分: ' + score;
                    gameOverOverlay.classList.remove('hidden');
                    return;
                }
            }

            // 粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // 星空背景
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            for (let i = 0; i < 60; i++) {
                const sx = (i * 137.5 + performance.now() * 0.002 * (i % 3 + 1)) % W;
                const sy = (i * 97.3 + performance.now() * 0.01 * (i % 2 + 0.5)) % H;
                ctx.fillRect(sx, sy, 1.5, 1.5);
            }

            drawPlayer();

            // 子弹
            ctx.fillStyle = '#ffd200';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
            });

            // 敌人
            enemies.forEach(e => {
                ctx.fillStyle = e.hp > 1 ? '#e57373' : '#ff8a80';
                ctx.fillRect(e.x - e.w / 2, e.y - e.h / 2, e.w, e.h);
            });

            // 粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            });
            ctx.globalAlpha = 1;
        }

        function loop(now) {
            if (!gameOver) {
                update(now);
                draw();
            }
            animId = requestAnimationFrame(loop);
        }

        function startGame() {
            startOverlay.classList.add('hidden');
            init();
            cancelAnimationFrame(animId);
            animId = requestAnimationFrame(loop);
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('retryBtn').addEventListener('click', () => {
            init();
        });
    })();
    </script>
</body>
</html>
